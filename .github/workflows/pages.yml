# Mantiene el sitio publicado: copia main → rama gh-pages en cada push.
# GitHub Pages sirve la rama gh-pages en https://tdkvalex.github.io/OCIO/
name: Publicar en GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publicar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publicar en la rama gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan pagina
          git rm -rfq --cached .
          rm -rf .github
          touch .nojekyll
          git add -A
          git commit -qm "Publicar sitio ($GITHUB_SHA)"
          git push -f origin HEAD:gh-pages
