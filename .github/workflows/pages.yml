# Publica la app de torneos en GitHub Pages en cada push a main
# URL: https://tdkvalex.github.io/OCIO/
name: Publicar en GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Pages (habilita el sitio si no existe)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Preparar sitio
        run: |
          mkdir -p _site
          rsync -a --exclude .git --exclude .github --exclude _site --exclude node_modules ./ _site/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Desplegar
        id: deployment
        uses: actions/deploy-pages@v4
